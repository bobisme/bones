name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        features: [default, all]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.os }}-${{ matrix.features }}
      - name: Check (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo check --workspace --all-features --exclude bones-search
            cargo check -p bones-search --features semantic-ort
          else
            cargo check
          fi
      - name: Check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ("${{ matrix.features }}" -eq "all") {
            cargo check --workspace --no-default-features --features otel --exclude bones-search
            cargo check -p bones-search --features semantic-model2vec
            cargo check -p bones-search --no-default-features
          } else {
            cargo check
          }

  test:
    name: Test Suite (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        features: [default, all]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-${{ matrix.features }}
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo test --workspace --all-features --exclude bones-search
            cargo test -p bones-search --features semantic-ort
          else
            cargo test
          fi
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ("${{ matrix.features }}" -eq "all") {
            cargo test --workspace --no-default-features --features otel --exclude bones-search
            cargo test -p bones-search --features semantic-model2vec
            cargo test -p bones-search --no-default-features
          } else {
            cargo test
          }

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        features: [default, all]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}-${{ matrix.features }}
      - name: Lint (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo clippy --workspace --all-features --exclude bones-search -- -D warnings
            cargo clippy -p bones-search --features semantic-ort -- -D warnings
          else
            cargo clippy -- -D warnings
          fi
      - name: Lint (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ("${{ matrix.features }}" -eq "all") {
            cargo clippy --workspace --no-default-features --features otel --exclude bones-search -- -D warnings
            cargo clippy -p bones-search --features semantic-model2vec -- -D warnings
            cargo clippy -p bones-search --no-default-features -- -D warnings
          } else {
            cargo clippy -- -D warnings
          }

  sim:
    name: Simulation Invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run deterministic simulation campaign
        run: |
          set -euo pipefail
          cargo run -p bones-cli -- dev sim run --seeds 50 --agents 5 --rounds 24 --faults 0.1 --format json | tee sim-report.json
      - name: Replay first failing seed
        if: failure()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import pathlib
          import subprocess

          report_path = pathlib.Path("sim-report.json")
          if not report_path.exists():
              print("sim-report.json not found; skipping replay")
              raise SystemExit(0)

          report = json.loads(report_path.read_text())
          seed = report.get("first_failure")
          if seed is None:
              print("No first_failure seed present; skipping replay")
              raise SystemExit(0)

          cmd = [
              "cargo",
              "run",
              "-p",
              "bones-cli",
              "--",
              "dev",
              "sim",
              "replay",
              "--seed",
              str(seed),
              "--agents",
              "5",
              "--rounds",
              "24",
              "--faults",
              "0.1",
              "--format",
              "json",
          ]
          print("Replaying failing seed:", seed)
          with open("sim-replay.json", "w", encoding="utf-8") as out:
              proc = subprocess.run(cmd, stdout=out, stderr=subprocess.STDOUT, check=False)
          print("Replay exit code:", proc.returncode)
          raise SystemExit(0)
          PY
      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: |
            sim-report.json
            sim-replay.json
          if-no-files-found: ignore

  bench:
    name: Benchmark SLO Gate
    runs-on: ubuntu-latest
    env:
      BONES_BENCH_MAX_EVENTS: 25000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run large-repo benchmark
        run: |
          set -euo pipefail
          cargo bench -p bones-core --bench large_repo -- --noplot 2>&1 | tee large-repo-bench.log
      - name: Enforce large-repo SLO thresholds
        run: python scripts/check_large_repo_slo.py large-repo-bench.log
      - name: Upload benchmark log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: large-repo-bench-log
          path: large-repo-bench.log
          if-no-files-found: warn
