name: Benchmark Trends

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

env:
  CARGO_TERM_COLOR: always
  BONES_BENCH_MAX_EVENTS: 25000

jobs:
  benchmark:
    name: Tiered benchmark snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run benchmark harness
        run: |
          set -euo pipefail
          cargo bench -p bones-core --bench operations --bench report --bench large_repo -- --noplot 2>&1 | tee benchmark-trends.log
      - name: Enforce large-repo SLO thresholds
        run: python scripts/check_large_repo_slo.py benchmark-trends.log
      - name: Upload criterion output
        uses: actions/upload-artifact@v4
        with:
          name: criterion-output
          path: target/criterion
          if-no-files-found: warn
      - name: Upload benchmark log
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-trends-log
          path: benchmark-trends.log
          if-no-files-found: warn
